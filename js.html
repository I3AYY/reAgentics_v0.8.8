<script>
/**
 * =========================================================================
 * System: reAgentics - Laboratory Reagent Management System
 * Version: 0.8.8 (AI Core)
 * File: js.html (Client-side JavaScript Logic)
 * Developer: P. PURICUMPEE & AI Assistant
 * Update: Smart OTP, Company/Price, Transport Temp/Speed, Delivery Note PDF
 * =========================================================================
 */

const { createApp, ref, reactive, onMounted, computed, watch, nextTick } = Vue;

const runGas = (funcName, ...args) => {
    return new Promise((resolve, reject) => {
        if (typeof google === 'undefined') { 
            reject(new Error("ไม่พบ Google API")); 
            return; 
        }
        google.script.run
            .withSuccessHandler(res => res ? resolve(res) : reject(new Error("No response")))
            .withFailureHandler(err => reject(err))
            [funcName](...args);
    });
};

const app = createApp({
    setup() {
        const appVersion = "v0.8.8 AI Core"; 
        const page = ref('login'); 
        const loginStep = ref(1);
        const otpInput = ref('');
        const otpMessage = ref('');
        const otpCooldown = ref(0); 
        let otpTimerInterval = null;
        
        const isLocked = ref(false);
        const lockPassword = ref('');
        const lockError = ref('');
        let afkTimeout = null;
        let sessionCheckInterval = null;

        const theme = ref('light'); 
        
        const isLoading = ref(true);
        const isDataLoading = ref(false);
        const isSpinning = ref(false);
        const isSidebarOpen = ref(true); 
        
        const showSettingsModal = ref(false);
        const showProfileModal = ref(false);
        const showStickerModal = ref(false); 
        const isDbConfigLoading = ref(false); 
        const dbModalTab = ref('core'); 

        // Image Viewer State
        const showImageViewer = ref(false);
        const viewerImageUrl = ref('');

        const user = reactive({ name: '', position: '', role: '', username: '', userId: '', image: '', group: '', unitIdRaw: '', allowedUnits: [] });
        const systemConfig = reactive({ logoUrl: 'https://cdn-icons-png.flaticon.com/512/3003/3003251.png' });
        const config = reactive({ years: [], selectedYear: '' });
        const formLogin = reactive({ username: '', password: '' });

        const dbConfig = reactive({ 
            mainId: '', unitId: '', userId: '', configId: '', logId: '', years: [],
            folderProfile: '', folderLogo: '', unitFolders: [], deliveryNoteFolders: []
        });

        // -----------------------------------------------------------------
        // Users Admin Management State
        // -----------------------------------------------------------------
        const usersList = ref([]);
        const isUsersLoading = ref(false);
        const showEditUserModal = ref(false);
        const isSavingUser = ref(false);
        
        const formUserEdit = reactive({
            originalUserId: '', name: '', userId: '', email: '', group: '', 
            role: 'USER', unitIdRaw: '', unitIdArr: [], status: 'ปกติ', otpStatus: 'ON'
        });

        // -----------------------------------------------------------------
        // Inventory & Filter State
        // -----------------------------------------------------------------
        const inventoryList = ref([]); 
        const formOptions = reactive({ units: [], reagUnits: [], analyzers: [], storageLocations: [], companies: [] });
        
        const filterDashboardGroup = ref('All'); // สำหรับหน้า Dashboard (Admin)
        const filterGroup = ref('All');          // กลุ่มงานหน้า Inventory
        const filterUnit = ref('All');           // หน่วยงานหน้า Inventory
        const filterSearch = ref('');

        // Item Modal Management
        const showItemModal = ref(false);
        const itemModalMode = ref('create'); 
        const isGeneratingId = ref(false);
        const formItem = reactive({
            itemID: '', itemName: '', minLevel: 5, unit: '', group: '', unitID: '', 
            useAnalyzer: false, analyzer: '', storageTemp: '', storageLocation: '', isSuspended: false,
            image: '', imagePreview: '', imageChanged: false,
            company: '', price: 0 // เพิ่มข้อมูลบริษัทและราคา
        });

        // Transactions Management
        const transactionMode = ref(''); 
        const transactionFilterGroup = ref(''); 
        const transactionFilterUnit = ref('');  
        const receiveStaging = ref([]);
        const formReceive = reactive({ itemStr: '', lot: '', exp: '', qty: 1 });
        const formDispense = reactive({ itemStr: '', qty: 1, barcodeInput: '', lot: '' });

        // Transport & Delivery Note
        const transactionTransportSpeed = ref('');
        const deliveryNoteBase64 = ref('');
        const deliveryNoteFileName = ref('');

        const availableDispenseLots = ref([]);
        const isDispenseLotsLoading = ref(false);

        // Print Modal
        const showPrintModal = ref(false);
        const isPrintLotsLoading = ref(false);
        const availableLots = ref([]);
        const activePrintItem = ref(null);
        const formPrint = reactive({ selectedLotStr: '', printCount: 1 });

        // Sticker Configuration
        const stickerZoom = ref(3.0); 
        const activeStickerElement = ref(null); 
        const stickerConfig = reactive({
            width: 50, height: 30, autoPrintCount: 2, manualPrintCount: 1,
            barcodeHeight: 35, barcodeWidth: 1.5,
            layout: {
                cyto: { x: 25, y: 4, size: 11, rot: 0, visible: true, bold: true, font: 'Montserrat' },  
                name: { x: 25, y: 9, size: 9, rot: 0, visible: false, bold: false, font: 'Montserrat' }, 
                age:  { x: 10, y: 26, size: 10, rot: 0, visible: true, bold: true, font: 'Roboto Mono' }, 
                spec: { x: 40, y: 26, size: 10, rot: 0, visible: true, bold: true, font: 'Roboto Mono' }, 
                unit: { x: 25, y: 28, size: 8, rot: 0, visible: false, bold: false, font: 'Montserrat' }, 
                bar:  { x: 25, y: 15, rot: 0, visible: true, width: 1.5 } 
            }
        });
        const mockSticker = reactive({ itemName: 'Glucose Reagent', itemID: 'CHE-001', lot: 'L889900', exp: '31/12/2026', unit: 'box' });

        // =================================================================
        // COMPUTED PROPERTIES
        // =================================================================

        // 1. ดึงกลุ่มงานทั้งหมดจาก formOptions.units
        const availableUserGroups = computed(() => {
            const groups = formOptions.units.map(u => u.group).filter(Boolean);
            return [...new Set(groups)];
        });

        // 2. กลุ่มงานที่ผู้ใช้คนนี้มีสิทธิ์เลือก (ADMIN เห็นหมด, MANAGER/USER เห็นแค่ตัวเอง)
        const availableGroupsForUser = computed(() => {
            if ((user.role || '').toUpperCase() === 'ADMIN') return availableUserGroups.value;
            return user.group ? [user.group] : [];
        });

        // 3. หน่วยงานที่สอดคล้องกับกลุ่มงาน (สำหรับฟอร์มแก้ไขพนักงาน - User Admin)
        const availableUnitsForGroup = computed(() => {
            if (!formUserEdit.group) return [];
            return formOptions.units.filter(u => u.group === formUserEdit.group).map(u => u.name);
        });

        // 4. หน่วยงานที่สอดคล้องกับตัวกรองในหน้า Inventory
        const availableUnitsForFilter = computed(() => {
            let units = formOptions.units;
            const targetGroup = (user.role || '').toUpperCase() === 'ADMIN' ? filterGroup.value : user.group;
            if (targetGroup !== 'All') units = units.filter(u => u.group === targetGroup);
            return units.map(u => u.name);
        });

        // 5. หน่วยงานที่สอดคล้องกับตัวกรองในหน้า Transactions (รับ/เบิก)
        const availableUnitsForTransaction = computed(() => {
            const role = (user.role || '').toUpperCase();
            if (role === 'ADMIN') {
                if (!transactionFilterGroup.value) return [];
                return formOptions.units.filter(u => u.group === transactionFilterGroup.value).map(u => u.name);
            } else {
                // MANAGER และ USER สามารถรับ/เบิกน้ำยาได้ "ทุกหน่วยงาน" ที่อยู่ในกลุ่มงานตัวเอง
                if (!user.group) return [];
                return formOptions.units.filter(u => u.group === user.group).map(u => u.name);
            }
        });

        // 6. หน่วยงานที่สอดคล้องกับกลุ่มงานในฟอร์มลงทะเบียนน้ำยา (Item Modal)
        const availableUnitsForItemForm = computed(() => {
            const role = (user.role || '').toUpperCase();
            if (role === 'ADMIN') {
                if (!formItem.group) return [];
                return formOptions.units.filter(u => u.group === formItem.group).map(u => u.name);
            } else if (role === 'MANAGER') {
                // MANAGER สร้างน้ำยาได้เฉพาะ UnitID ที่ตัวเองดูแลเท่านั้น (อิงจาก user.unitIdRaw)
                if (!user.unitIdRaw) return [];
                const managedPrefixes = user.unitIdRaw.split(',').map(s => s.trim().toUpperCase());
                return formOptions.units.filter(u => managedPrefixes.includes(u.prefix.toUpperCase())).map(u => u.name);
            }
            return [];
        });

        // Computed Helper: เช็คว่า MANAGER มีสิทธิ์กดปุ่ม "แก้ไขน้ำยา" หรือไม่
        const canEditItem = (item) => {
            const role = (user.role || '').toUpperCase();
            if (role === 'ADMIN') return true;
            if (role === 'MANAGER') {
                if (!user.unitIdRaw) return false;
                const managedPrefixes = user.unitIdRaw.split(',').map(s => s.trim().toUpperCase());
                const unitObj = formOptions.units.find(u => u.name === item.unitID);
                if (unitObj && managedPrefixes.includes(unitObj.prefix.toUpperCase())) return true;
            }
            return false;
        };

        // 7. Stats (Dashboard) แบบ Real-time
        const stats = computed(() => {
            let list = inventoryList.value;
            if ((user.role || '').toUpperCase() === 'ADMIN') {
                if (filterDashboardGroup.value !== 'All') list = list.filter(item => item.group === filterDashboardGroup.value);
            } else {
                list = list.filter(item => item.group === user.group);
            }

            let total = 0, low = 0;
            list.forEach(item => {
                total++;
                if (item.balance < item.minLevel && item.status !== 'Suspended') low++;
            });
            return { total, lowStock: low, expiring: 0 }; 
        });

        // 8. ข้อมูลรายการน้ำยาหน้า Inventory
        const filteredInventory = computed(() => {
            let list = inventoryList.value;
            const targetGroup = (user.role || '').toUpperCase() === 'ADMIN' ? filterGroup.value : user.group;
            if (targetGroup !== 'All') list = list.filter(item => item.group === targetGroup);
            
            if (filterUnit.value !== 'All') list = list.filter(item => item.unitID === filterUnit.value);
            if (filterSearch.value) {
                const q = filterSearch.value.toLowerCase();
                list = list.filter(item => item.itemName.toLowerCase().includes(q) || item.itemID.toLowerCase().includes(q));
            }
            return list;
        });

        // 9. ข้อมูลรายการน้ำยาหน้า Transactions (รับ/เบิก)
        const filteredItemOptions = computed(() => {
            if (!transactionFilterUnit.value) return []; // บังคับให้เลือก Unit ก่อน ถึงจะมีให้เลือกน้ำยา
            
            let list = inventoryList.value.filter(item => item.status !== 'Suspended');
            list = list.filter(item => item.unitID === transactionFilterUnit.value);

            return list.map(item => ({
                valStr: `${item.itemID}|${item.itemName}|${item.unit}`,
                displayText: `${item.itemID} : ${item.itemName}`
            }));
        });

        const filteredAnalyzers = computed(() => {
            if(!formItem.unitID) return [];
            return formOptions.analyzers.filter(a => a.unit === formItem.unitID);
        });

        const maxDispenseQty = computed(() => {
            if (!formDispense.lot || availableDispenseLots.value.length === 0) return Number.MAX_SAFE_INTEGER;
            const selectedLotObj = availableDispenseLots.value.find(l => l.lot === formDispense.lot);
            return selectedLotObj ? selectedLotObj.qty : Number.MAX_SAFE_INTEGER;
        });

        const selectedReceiveItemImage = computed(() => {
            if (!formReceive.itemStr) return '';
            const [itemID] = formReceive.itemStr.split('|');
            const item = inventoryList.value.find(i => i.itemID === itemID);
            return item && item.image ? item.image : '';
        });

        const selectedDispenseItemImage = computed(() => {
            if (!formDispense.itemStr) return '';
            const [itemID] = formDispense.itemStr.split('|');
            const item = inventoryList.value.find(i => i.itemID === itemID);
            return item && item.image ? item.image : '';
        });


        // =================================================================
        // WATCHERS
        // =================================================================
        const AFK_LIMIT_MS = 25 * 60 * 1000; 
        const SESSION_LIMIT_MS = 60 * 60 * 1000; 

        watch(page, (newVal, oldVal) => {
            if (newVal === 'transactions' && oldVal !== 'transactions') {
                transactionMode.value = '';
                transactionFilterGroup.value = '';
                transactionFilterUnit.value = '';
                receiveStaging.value = [];
                Object.assign(formReceive, { itemStr: '', lot: '', exp: '', qty: 1 });
                Object.assign(formDispense, { itemStr: '', qty: 1, barcodeInput: '', lot: '' });
                availableDispenseLots.value = [];
                transactionTransportSpeed.value = '';
                removeDeliveryNote();
            }
            if (newVal === 'inventory' && oldVal !== 'inventory') {
                fetchData(true);
            }
        });

        // เมื่อเลือกกลุ่มงานเปลี่ยน ให้ Reset หน่วยงาน
        watch(filterGroup, () => { filterUnit.value = 'All'; });

        watch(() => formItem.useAnalyzer, (newVal) => { if (!newVal) formItem.analyzer = ''; });

        watch(() => formDispense.itemStr, async (newVal) => {
            availableDispenseLots.value = [];
            formDispense.lot = '';
            if (newVal) {
                const [itemID] = newVal.split('|');
                isDispenseLotsLoading.value = true;
                try {
                    const res = await runGas('apiGetActiveLots', itemID);
                    if (res.success) availableDispenseLots.value = res.lots;
                } catch(e) { console.error("Error fetching lots:", e); } 
                finally { isDispenseLotsLoading.value = false; }
            }
        });

        watch(() => config.selectedYear, (newVal) => { if (newVal && page.value !== 'login') { fetchData(); saveSession(); } });

        // -----------------------------------------------------------------
        // Authentication Methods (Update OTP & Security Bypass)
        // -----------------------------------------------------------------
        const startOtpTimer = () => {
            otpCooldown.value = 60;
            if (otpTimerInterval) clearInterval(otpTimerInterval);
            otpTimerInterval = setInterval(() => {
                otpCooldown.value--;
                if (otpCooldown.value <= 0) clearInterval(otpTimerInterval);
            }, 1000);
        };

        const handleLoginStep1 = async () => {
            if (!formLogin.username || !formLogin.password) return;
            isLoading.value = true;
            try {
                const res = await runGas('verifyLogin', formLogin.username, formLogin.password);
                if (res.success) { 
                    // ตรวจสอบสถานะ Bypass (ตั้งค่าใน Admin ให้ไม่ต้องขอ OTP)
                    if (res.bypassed) {
                        Object.assign(user, res.user); 
                        config.years = res.years || [];
                        if (config.years.length > 0 && !config.selectedYear) config.selectedYear = config.years[config.years.length - 1];
                        
                        page.value = 'dashboard'; 
                        saveSession(); 
                        
                        fetchData(); fetchStickerConfig(); fetchFormOptions();
                        resetAfkTimer(); startSessionMonitor(); 
                        if(typeof Swal !== 'undefined') Swal.fire({ icon: 'success', title: 'Welcome', text: `คุณ ${user.name}`, timer: 1500, showConfirmButton: false });
                    } else {
                        // เข้าสู่หน้ากรอก OTP ตามปกติ
                        loginStep.value = 2; 
                        otpMessage.value = res.message; 
                        user.userId = res.userId; 
                        startOtpTimer();
                    }
                } else { 
                    if(typeof Swal !== 'undefined') Swal.fire('Login Failed', res.message, 'error'); 
                }
            } catch (err) { console.error(err); } finally { isLoading.value = false; }
        };

        const handleResendOtp = async () => {
            if (otpCooldown.value > 0) return;
            isLoading.value = true;
            try {
                const res = await runGas('apiRequestNewOTP', user.userId);
                if (res.success) {
                    otpInput.value = ''; // เคลียร์ช่องพิมพ์ให้ว่างทันที
                    otpMessage.value = res.message;
                    startOtpTimer();
                    if(typeof Swal !== 'undefined') Swal.fire({ icon: 'success', title: 'ส่ง OTP ใหม่แล้ว', text: 'กรุณาตรวจสอบที่กล่องจดหมายของคุณ', timer: 1500, showConfirmButton: false });
                } else {
                    if(typeof Swal !== 'undefined') Swal.fire('ข้อผิดพลาด', res.message, 'error');
                }
            } catch (err) { console.error(err); } finally { isLoading.value = false; }
        };

        const handleLoginStep2 = async () => {
            if (!otpInput.value) return;
            isLoading.value = true;
            try {
                const res = await runGas('verifyOTP', user.userId, otpInput.value);
                if (res.success) {
                    if (otpTimerInterval) clearInterval(otpTimerInterval);
                    Object.assign(user, res.user); 
                    config.years = res.years || [];
                    if (config.years.length > 0 && !config.selectedYear) config.selectedYear = config.years[config.years.length - 1];
                    
                    page.value = 'dashboard'; 
                    saveSession(); 
                    
                    fetchData(); fetchStickerConfig(); fetchFormOptions();
                    resetAfkTimer(); startSessionMonitor(); 
                    if(typeof Swal !== 'undefined') Swal.fire({ icon: 'success', title: 'Welcome', text: `คุณ ${user.name}`, timer: 1500, showConfirmButton: false });
                } else { if(typeof Swal !== 'undefined') Swal.fire('OTP Failed', res.message, 'error'); }
            } catch (err) { console.error(err); } finally { isLoading.value = false; }
        };

        const handleCancelLogin = () => { loginStep.value = 1; otpInput.value = ''; if (otpTimerInterval) clearInterval(otpTimerInterval); };

        const handleLogout = async () => {
            if(typeof Swal === 'undefined') return forceLogout();
            const result = await Swal.fire({ title: 'ออกจากระบบ?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'ยืนยัน', cancelButtonText: 'ยกเลิก' });
            if (result.isConfirmed) { runGas('logSystem', 'Logout', 'User manual logout', user.userId).catch(()=>{}); forceLogout(); }
        };

        const forceLogout = (isExpired = false) => {
            page.value = 'login'; 
            isLocked.value = false; isLoading.value = true;
            clearTimeout(afkTimeout); if (sessionCheckInterval) clearInterval(sessionCheckInterval); if (otpTimerInterval) clearInterval(otpTimerInterval);
            
            Object.assign(user, { name: '', position: '', role: '', username: '', userId: '', image: '', group: '', unitIdRaw: '', allowedUnits: [] });
            localStorage.removeItem('reAgenticsUser_v1'); 
            
            setTimeout(() => {
                loginStep.value = 1; otpInput.value = ''; formLogin.username = ''; formLogin.password = ''; isLoading.value = false;
                if (isExpired && typeof Swal !== 'undefined') Swal.fire({ icon: 'warning', title: 'เซสชันหมดอายุ', text: 'ระบบลงชื่อออกอัตโนมัติ (PDPA)', confirmButtonText: 'เข้าสู่ระบบใหม่' });
            }, 800);
        };

        const saveSession = () => {
            if (systemConfig.logoUrl) localStorage.setItem('reAgenticsLogo_v1', systemConfig.logoUrl);
            if (!user.userId || page.value === 'login') return; 
            localStorage.setItem('reAgenticsUser_v1', JSON.stringify({ 
                user: user, years: config.years, selectedYear: config.selectedYear,
                theme: theme.value, isLocked: isLocked.value, lastActive: Date.now() 
            }));
        };

        const resetAfkTimer = () => {
            if (page.value === 'login') return;
            if (!isLocked.value) { saveSession(); clearTimeout(afkTimeout); afkTimeout = setTimeout(() => { lockScreen(); }, AFK_LIMIT_MS); }
        };

        const startSessionMonitor = () => {
            if (sessionCheckInterval) clearInterval(sessionCheckInterval);
            sessionCheckInterval = setInterval(() => {
                if (page.value === 'login') return;
                const savedStr = localStorage.getItem('reAgenticsUser_v1');
                if (savedStr) {
                    try {
                        const saved = JSON.parse(savedStr);
                        if (Date.now() - (saved.lastActive || 0) > SESSION_LIMIT_MS) {
                            runGas('logSystem', 'Auto Logout', 'Session expired', user.userId).catch(()=>{}); forceLogout(true); 
                        }
                    } catch(e) {}
                }
            }, 60000); 
        };

        const lockScreen = () => {
            if (page.value === 'login') return;
            isLocked.value = true; lockPassword.value = ''; lockError.value = '';
            clearTimeout(afkTimeout); saveSession();
        };

        // แก้ไขให้มีการบังคับ Log out เมื่อกรอกรหัสหน้า Lock Screen ผิด
        const unlockScreen = async () => {
            if (!lockPassword.value) return;
            isLoading.value = true; lockError.value = '';
            try {
                const res = await runGas('verifyPasswordOnly', user.userId, lockPassword.value);
                if (res.status === 'success' || res.success) { 
                    isLocked.value = false; resetAfkTimer(); 
                } else { 
                    // บังคับ Log out ทันทีเมื่อรหัสผิด
                    if(typeof Swal !== 'undefined') {
                        await Swal.fire({ icon: 'error', title: 'รหัสผ่านไม่ถูกต้อง!', text: 'ระบบจะทำการลงชื่อออกอัตโนมัติเพื่อความปลอดภัย', confirmButtonText: 'ตกลง', confirmButtonColor: '#ef4444' });
                    }
                    forceLogout(); 
                }
            } catch (e) { lockError.value = 'เกิดข้อผิดพลาดในการเชื่อมต่อ'; } finally { isLoading.value = false; }
        };

        // -----------------------------------------------------------------
        // Core Data Fetching
        // -----------------------------------------------------------------
        const fetchData = async (showSpinner = false) => {
            if (page.value === 'login' || !config.selectedYear) return;
            if(showSpinner) isSpinning.value = true;
            isDataLoading.value = true; 
            try {
                const res = await runGas('getItemsData');
                if (res && res.success) {
                    mapInventoryData(res.data);
                } else { console.error("fetchData failed: ", res); }
            } catch (err) { console.error("fetchData error: ", err); } 
            finally { 
                isDataLoading.value = false; 
                setTimeout(() => isSpinning.value = false, 500); 
            }
        };

        const fetchFormOptions = async () => {
            try {
                const res = await runGas('apiGetFormOptions');
                if (res && res.success) Object.assign(formOptions, res.data);
            } catch(e) { console.error("fetchFormOptions Error:", e); }
        };

        const mapInventoryData = (payloadData) => {
            if (!payloadData || payloadData.length === 0) { 
                inventoryList.value = []; 
                return; 
            }
            const mapped = []; 
            try {
                if (payloadData[0] && typeof payloadData[0] === 'object' && !Array.isArray(payloadData[0])) {
                    payloadData.forEach(row => {
                        const balance = Number(row.balance) || 0;
                        const minLevel = Number(row.minLevel) || 0;
                        const status = row.status || 'Active';
                        // รวม company และ price เข้ามาในข้อมูลด้วย
                        mapped.push({ ...row, balance, minLevel, status });
                    });
                }
                inventoryList.value = mapped; 
            } catch (err) { console.error("Map Data Error: ", err); }
        };

        // -----------------------------------------------------------------
        // Users Admin Data & Management
        // -----------------------------------------------------------------
        const openUsersAdminPage = () => {
            showSettingsModal.value = false;
            page.value = 'users';
            fetchUsersList();
        };

        const fetchUsersList = async () => {
            isUsersLoading.value = true;
            try {
                const res = await runGas('apiGetUsersList', user.userId);
                if (res.success) usersList.value = res.data;
                else Swal.fire('ข้อผิดพลาด', res.message, 'error');
            } catch (e) { Swal.fire('Error', e.message, 'error'); }
            finally { isUsersLoading.value = false; }
        };

        const openEditUserModal = (u) => {
            Object.assign(formUserEdit, {
                originalUserId: u.originalUserId || u.userId,
                name: u.name, userId: u.userId, email: u.email,
                group: u.group, role: u.role, status: u.status,

            const file = event.target.files[0];

                Swal.fire('ไฟล์ใหญ่เกินไป', 'กรุณาอัปโหลดรูปภาพขนาดไม่เกิน 5MB', 'warning');

            for(let i = 0; i < receiveStaging.value.length; i++) {

            if (!confirm.isConfirmed) return;

            const splitIdx = barcode.lastIndexOf('-');
            if (splitIdx === -1) return;
            const itemID = barcode.substring(0, splitIdx);
            const lot = barcode.substring(splitIdx + 1);
            
            const matched = inventoryList.value.find(row => row.itemID === itemID);
            const itemName = matched ? matched.itemName : itemID;

            if (matched && matched.status === 'Suspended') {
                Swal.fire('ปฏิเสธการทำรายการ', 'น้ำยารายการนี้ถูกระงับการใช้งาน', 'error'); return;

            const { value: formValues } = await Swal.fire({
                title: 'นำเข้าไฟล์ข้อมูลรายปี',
                html: `<div class="text-left space-y-3"><div><label class="text-xs font-bold text-slate-500">ปี พ.ศ. (Year)</label><input id="swal-year" type="number" class="swal2-input text-sm m-0 w-full" placeholder="${currentThaiYear}" value="${currentThaiYear}"></div><div><label class="text-xs font-bold text-slate-500">Sheet ID</label><input id="swal-sheetid" class="swal2-input text-sm m-0 w-full font-mono text-sky-600" placeholder="ใส่ Google Sheet ID ที่ต้องการนำเข้า"></div></div>`,
                focusConfirm: false, showCancelButton: true, confirmButtonText: 'นำเข้าข้อมูล', cancelButtonText: 'ยกเลิก', confirmButtonColor: '#0ea5e9',
                preConfirm: () => {
                    const year = document.getElementById('swal-year').value.trim(); const sheetId = document.getElementById('swal-sheetid').value.trim();
                    if (!year || !sheetId) { Swal.showValidationMessage('กรุณากรอกข้อมูลให้ครบถ้วน'); return false; }
                    return { year, sheetId };
                }
            });

            if (formValues) {
                isLoading.value = true;
                try {
                    const res = await runGas('apiManualAddYearSheet', formValues.year, formValues.sheetId, user.userId);
                    if (res && res.success) {
                        Swal.fire('สำเร็จ', `นำเข้าและเชื่อมต่อไฟล์ปี ${formValues.year} เรียบร้อย`, 'success');
                        if (!config.years.includes(String(formValues.year))) { config.years.push(String(formValues.year)); }
                        saveSession();
                        fetchDbConfig(); 
                    } else { Swal.fire('ข้อผิดพลาด', res.message, 'error'); }
                } catch(e) { Swal.fire('Error', e.message, 'error'); } 
                finally { isLoading.value = false; }
            }
        };

        const disconnectYearSheet = (year) => {
            Swal.fire({
                title: 'ระงับการเชื่อมต่อ?', text: `ระบบจะหยุดเขียนข้อมูลลงไฟล์ปี ${year} ชั่วคราว`, icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#f59e0b', confirmButtonText: 'ระงับการเชื่อมต่อ'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    isLoading.value = true;
                    try {
                        const res = await runGas('apiDisconnectYearSheet', year, user.userId);
                        if (res.success) {
                            Swal.fire('สำเร็จ', `ระงับการเชื่อมต่อปี ${year} ชั่วคราวแล้ว`, 'success');
                            fetchDbConfig(); 
                            config.years = config.years.filter(y => String(y) !== String(year));
                            if (config.selectedYear === String(year)) { config.selectedYear = config.years.length > 0 ? config.years[config.years.length - 1] : ''; }
                            saveSession();
                        } else { Swal.fire('ข้อผิดพลาด', res.message, 'error'); }
                    } catch(e) { Swal.fire('Error', e.message, 'error'); }
                    finally { isLoading.value = false; }
                }
            });
        };

        const reconnectYearSheet = (year) => {
            const yearData = dbConfig.years.find(y => y.year === String(year));
            if(!yearData) return;

            Swal.fire({
                title: 'เปิดการเชื่อมต่อ?', text: `ระบบจะกลับมาเขียนข้อมูลลงไฟล์ปี ${year} ตามปกติ`, icon: 'info',
                showCancelButton: true, confirmButtonColor: '#10b981', confirmButtonText: 'เปิดเชื่อมต่อ'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    isLoading.value = true;
                    try {
                        const res = await runGas('apiManualAddYearSheet', year, yearData.fileId, user.userId);
                        if (res.success) {
                            Swal.fire('สำเร็จ', `กลับมาเชื่อมต่อปี ${year} เรียบร้อย`, 'success');
                            fetchDbConfig();
                            if (!config.years.includes(String(year))) config.years.push(String(year));
                            saveSession();
                        } else { Swal.fire('ข้อผิดพลาด', res.message, 'error'); }
                    } catch(e) { Swal.fire('Error', e.message, 'error'); }
                    finally { isLoading.value = false; }
                }
            });
        };

        const deleteYearSheet = (year) => {
            Swal.fire({
                title: 'ลบการเชื่อมต่อถาวร?', text: `ลบการตั้งค่าไฟล์ปี ${year} ออกจากระบบ (ไฟล์บน Drive ไม่ถูกลบ)`, icon: 'error',
                showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'ลบถาวร'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    isLoading.value = true;
                    try {
                        const res = await runGas('apiDeleteYearSheet', year, user.userId);
                        if (res.success) {
                            Swal.fire('ลบสำเร็จ', `ลบการเชื่อมต่อปี ${year} เรียบร้อย`, 'success');
                            fetchDbConfig();
                            config.years = config.years.filter(y => String(y) !== String(year));
                            if (config.selectedYear === String(year)) { config.selectedYear = config.years.length > 0 ? config.selectedYear : ''; }
                            saveSession();
                        } else { Swal.fire('ข้อผิดพลาด', res.message, 'error'); }
                    } catch(e) { Swal.fire('Error', e.message, 'error'); }
                    finally { isLoading.value = false; }
                }
            });
        };

        // -----------------------------------------------------------------
        // Sticker Designer Methods
        // -----------------------------------------------------------------
        const fetchStickerConfig = async () => {
            try {
                const res = await runGas('apiGetStickerConfig');
                if (res && res.status === 'success') {
                    Object.assign(stickerConfig, res.config);
                    if (res.config.layoutJSON) {
                        try { 
                            const parsed = JSON.parse(res.config.layoutJSON);
                            for (let k in parsed) { if (stickerConfig.layout[k]) Object.assign(stickerConfig.layout[k], parsed[k]); }
                        } catch(e) { console.error(e); }
                    }
                }
            } catch (e) {}
        };

        const saveStickerConfig = async () => {
            if ((user.role || '').toUpperCase() !== 'ADMIN') { Swal.fire('ปฏิเสธการเข้าถึง', 'เฉพาะ Admin เท่านั้นที่แก้ไขสติกเกอร์ได้', 'warning'); return; }
            isLoading.value = true;
            try {
                const payload = { ...stickerConfig };
                payload.layoutJSON = JSON.stringify(stickerConfig.layout);
                delete payload.layout; 
                const res = await runGas('apiSaveStickerConfig', payload, user.userId);
                if (res && res.status === 'success') { Swal.fire('สำเร็จ', 'บันทึกเลย์เอาต์สติ๊กเกอร์เรียบร้อย', 'success'); showStickerModal.value = false; } 
                else { Swal.fire('ข้อผิดพลาด', res.message, 'error'); }
            } catch (e) { Swal.fire('ข้อผิดพลาด', e.message, 'error'); } finally { isLoading.value = false; }
        };

        const generatePreviewBarcode = () => {
            const el = document.getElementById('barcode-preview');
            if (typeof JsBarcode !== 'undefined' && el && stickerConfig.layout) {
                JsBarcode(el, `${mockSticker.itemID}-${mockSticker.lot}`, {
                    format: "CODE128", width: Number(stickerConfig.barcodeWidth) || 1.5, height: Number(stickerConfig.barcodeHeight) || 35, 
                    displayValue: true, fontSize: 11, fontOptions: "bold", margin: 0, textMargin: 4
                });
            }
        };

        watch(() => showStickerModal.value, (newVal) => { if(newVal) setTimeout(generatePreviewBarcode, 300); });
        watch(() => [stickerConfig.barcodeHeight, stickerConfig.barcodeWidth], () => { if (showStickerModal.value) generatePreviewBarcode(); }, { deep: true });

        const pxToMm = (px) => px * (25.4 / 96); 
        const startDrag = (elementKey, event) => {
            activeStickerElement.value = elementKey;
            const startX = event.clientX; const startY = event.clientY;
            const initialX = stickerConfig.layout[elementKey].x; const initialY = stickerConfig.layout[elementKey].y;
            const onMouseMove = (e) => {
                const dxMm = pxToMm(e.clientX - startX) / stickerZoom.value; const dyMm = pxToMm(e.clientY - startY) / stickerZoom.value;
                stickerConfig.layout[elementKey].x = Math.round((initialX + dxMm) * 10) / 10; stickerConfig.layout[elementKey].y = Math.round((initialY + dyMm) * 10) / 10;
            };
            const onMouseUp = () => { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); };
            document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp);
        };

        const startRotate = (elementKey, event) => {
            event.stopPropagation(); activeStickerElement.value = elementKey;
            const targetEl = event.target.closest('.sticker-element');
            if (!targetEl) return;
            const rect = targetEl.getBoundingClientRect(); const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
            const onMouseMove = (e) => {
                const radians = Math.atan2(e.clientY - centerY, e.clientX - centerX);
                let degrees = (radians * (180 / Math.PI)) + 90; if (degrees < 0) degrees += 360;
                const snap = 15; degrees = Math.round(degrees / snap) * snap; if (degrees === 360) degrees = 0;
                stickerConfig.layout[elementKey].rot = degrees;
            };
            const onMouseUp = () => { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); };
            document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp);
        };

        const getFontStr = (fontName) => fontName ? `'${fontName}', 'Noto Sans Thai', sans-serif` : `'Montserrat', 'Noto Sans Thai', sans-serif`;

        const generateAndPrintBarcodes = (itemsArray) => {
            const count = Number(stickerConfig.autoPrintCount) || 1;
            if (count <= 0) return;

            let htmlContent = `
                <!DOCTYPE html><html><head><meta charset="UTF-8"><style>
                @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Noto+Sans+Thai:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap');
                @page { margin: 0; size: ${stickerConfig.width}mm ${stickerConfig.height}mm; }
                body { margin: 0; padding: 0; width: ${stickerConfig.width}mm; height: ${stickerConfig.height}mm; background: white; color: black; position: relative; overflow: hidden; }
                .page-break { page-break-after: always; width: 100%; height: 100%; position: relative; }
                .el { position: absolute; white-space: nowrap; transform-origin: center center; line-height: 1.1; }
                .barcode-img { display: block; max-width: none; }
                </style></head><body>
            `;
            const l = stickerConfig.layout;
            itemsArray.forEach(item => {
                const canvas = document.createElement('canvas'); let barcodeImageBase64 = "";
                if (l.bar.visible && typeof JsBarcode !== 'undefined') {
                    JsBarcode(canvas, `${item.itemID}-${item.lot}`, {
                        format: "CODE128", width: Number(stickerConfig.barcodeWidth) || 1.5, height: Number(stickerConfig.barcodeHeight) || 35, 
                        displayValue: true, fontSize: 11, fontOptions: "bold", margin: 0, textMargin: 4, lineColor: "#000000"
                    });
                    barcodeImageBase64 = canvas.toDataURL("image/png");
                }
                const totalPrints = item.qty * count;
                for (let i = 0; i < totalPrints; i++) {
                    htmlContent += `<div class="page-break">`;
                    if (l.cyto.visible) htmlContent += `<div class="el" style="left:${l.cyto.x}mm; top:${l.cyto.y}mm; font-size:${l.cyto.size}pt; font-weight:${l.cyto.bold?'bold':'normal'}; font-family:${getFontStr(l.cyto.font)}; transform: translate(-50%, -50%) rotate(${l.cyto.rot}deg);">${item.itemName.substring(0, 20)}</div>`;
                    if (l.age.visible) htmlContent += `<div class="el" style="left:${l.age.x}mm; top:${l.age.y}mm; font-size:${l.age.size}pt; font-weight:${l.age.bold?'bold':'normal'}; font-family:${getFontStr(l.age.font)}; transform: translate(-50%, -50%) rotate(${l.age.rot}deg);">Lot: ${item.lot}</div>`;
                    if (l.spec.visible) htmlContent += `<div class="el" style="left:${l.spec.x}mm; top:${l.spec.y}mm; font-size:${l.spec.size}pt; font-weight:${l.spec.bold?'bold':'normal'}; font-family:${getFontStr(l.spec.font)}; transform: translate(-50%, -50%) rotate(${l.spec.rot}deg);">Exp: ${formatDateThai(item.exp)}</div>`;
                    if (l.unit.visible) htmlContent += `<div class="el" style="left:${l.unit.x}mm; top:${l.unit.y}mm; font-size:${l.unit.size}pt; font-weight:${l.unit.bold?'bold':'normal'}; font-family:${getFontStr(l.unit.font)}; transform: translate(-50%, -50%) rotate(${l.unit.rot}deg);">${item.unit}</div>`;
                    if (l.bar.visible && barcodeImageBase64) htmlContent += `<div class="el" style="left:${l.bar.x}mm; top:${l.bar.y}mm; transform: translate(-50%, -50%) rotate(${l.bar.rot}deg);"><img src="${barcodeImageBase64}" class="barcode-img"></div>`;
                    htmlContent += `</div>`;
                }
            });
            htmlContent += `</body></html>`;
            
            const printIframe = document.createElement('iframe'); 
            printIframe.style.cssText = 'position:fixed; right:0; bottom:0; width:0; height:0; border:0;';
            document.body.appendChild(printIframe); 
            
            const iframeDoc = printIframe.contentWindow.document; 
            iframeDoc.open(); 
            iframeDoc.write(htmlContent); 
            iframeDoc.close();
            
            let isPrinted = false; 

            printIframe.onload = () => {
                setTimeout(() => { 
                    try {
                        if (isPrinted) return; 
                        isPrinted = true;
                        printIframe.contentWindow.focus(); 
                        printIframe.contentWindow.print(); 
                        setTimeout(() => { document.body.removeChild(printIframe); }, 2000); 
                    } catch(e) {}
                }, 800); 
            };

            setTimeout(() => {
                if (document.body.contains(printIframe)) {
                    try {
                        if (isPrinted) return; 
                        isPrinted = true;
                        printIframe.contentWindow.focus(); 
                        printIframe.contentWindow.print(); 
                        setTimeout(() => { if (document.body.contains(printIframe)) document.body.removeChild(printIframe); }, 2000);
                    } catch(e) {}
                }
            }, 2500);
        };

        const formatDateThai = (dateString) => {
            if (!dateString) return '-'; const date = new Date(dateString);
            return `${date.getDate().toString().padStart(2, '0')}/${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getFullYear() + 543}`;
        };

        const changeTheme = (newTheme) => { 
            theme.value = newTheme; 
            document.documentElement.setAttribute('data-theme', newTheme); 
            if (user.userId && page.value !== 'login') saveSession(); 
        };

        const handleImageUpload = (event, type) => {
            const file = event.target.files[0]; if (!file) return;
            if (file.size > 5 * 1024 * 1024) { Swal.fire('ไฟล์ใหญ่เกินไป', 'กรุณาอัปโหลดรูปภาพขนาดไม่เกิน 5MB', 'warning'); return; }
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Data = e.target.result; isLoading.value = true;
                try {
                    if (type === 'profile') {
                        const res = await runGas('apiSaveProfileImage', user.userId, base64Data);
                        if(res.status === 'success') { user.image = res.url; saveSession(); Swal.fire('สำเร็จ', 'อัปเดตรูปโปรไฟล์เรียบร้อย', 'success'); }
                    } else if (type === 'logo') {
                        const res = await runGas('apiSaveSystemLogo', base64Data, user.userId);
                        if(res.status === 'success') { 
                            systemConfig.logoUrl = res.url; 
                            localStorage.setItem('reAgenticsLogo_v1', res.url); 
                            saveSession(); 
                            showSettingsModal.value = false; 
                            Swal.fire('สำเร็จ', 'อัปเดตโลโก้ระบบเรียบร้อย', 'success'); 
                        }
                    }
                } catch(err) { Swal.fire('ข้อผิดพลาด', err.message, 'error'); } finally { isLoading.value = false; event.target.value = ''; }
            };
            reader.readAsDataURL(file);
        };

        const openChangePassword = async () => {
            const { value: formValues } = await Swal.fire({
                title: 'เปลี่ยนรหัสผ่าน',
                html: '<input id="swal-input1" class="swal2-input" type="password" placeholder="รหัสผ่านใหม่"><input id="swal-input2" class="swal2-input" type="password" placeholder="ยืนยันรหัสผ่านใหม่">',
                focusConfirm: false, showCancelButton: true, confirmButtonText: 'บันทึก', cancelButtonText: 'ยกเลิก',
                preConfirm: () => {
                    const p1 = document.getElementById('swal-input1').value; const p2 = document.getElementById('swal-input2').value;
                    if (!p1 || !p2) { Swal.showValidationMessage('กรุณากรอกรหัสให้ครบถ้วน'); return false; }
                    if (p1 !== p2) { Swal.showValidationMessage('รหัสผ่านไม่ตรงกัน'); return false; }
                    return p1;
                }
            });
            if (formValues) {
                isLoading.value = true;
                try {
                    const res = await runGas('apiChangePassword', user.userId, formValues);
                    if(res.status === 'success') { Swal.fire('สำเร็จ', 'เปลี่ยนรหัสผ่านเรียบร้อย', 'success'); } 
                    else { Swal.fire('ข้อผิดพลาด', res.message, 'error'); }
                } catch(e) { Swal.fire('ข้อผิดพลาด', e.message, 'error'); } 
                finally { isLoading.value = false; }
            }
        };

        onMounted(() => {
            window.addEventListener('mousemove', resetAfkTimer, { passive: true }); window.addEventListener('keydown', resetAfkTimer, { passive: true }); window.addEventListener('click', resetAfkTimer, { passive: true });
            
            const savedLogo = localStorage.getItem('reAgenticsLogo_v1');
            if (savedLogo) systemConfig.logoUrl = savedLogo;

            try {
                const savedStr = localStorage.getItem('reAgenticsUser_v1');
                if (savedStr) {
                    const parsed = JSON.parse(savedStr);
                    if (!parsed.user || !parsed.user.userId) throw new Error("Invalid Session");
                    
                    if (parsed.lastActive && (Date.now() - parsed.lastActive > SESSION_LIMIT_MS)) throw new Error("Session expired");
                    if (parsed.isLocked) { isLocked.value = true; } else { isLocked.value = false; resetAfkTimer(); }
                    Object.assign(user, parsed.user);
                    if(parsed.systemLogo) systemConfig.logoUrl = parsed.systemLogo;
                    if(parsed.theme) changeTheme(parsed.theme);
                    if (parsed.years) config.years = parsed.years;
                    if (parsed.selectedYear) config.selectedYear = parsed.selectedYear;

                    isLoading.value = false; page.value = 'dashboard';
                    fetchData(); fetchStickerConfig(); fetchFormOptions(); startSessionMonitor(); 
                } else { isLoading.value = false; }
            } catch (e) { forceLogout(true); }
        });

        return {
            appVersion, page, loginStep, formLogin, otpInput, otpMessage, otpCooldown,
            isLocked, lockPassword, lockError, unlockScreen, 
            isLoading, isDataLoading, isSpinning, isSidebarOpen,
            theme, changeTheme, showSettingsModal, showProfileModal, showStickerModal,
            
            isDbConfigLoading, dbConfig, dbModalTab, openDbSettingsModal, saveCoreDbConfig, createNewYearSheet,
            openManualAddYearModal, disconnectYearSheet, reconnectYearSheet, deleteYearSheet, backToSettings,
            
            showImageViewer, viewerImageUrl, openImageViewer, closeImageViewer,

            user, systemConfig, config, stats, 
            
            // Filters
            filterDashboardGroup, filterGroup, filterUnit, filterSearch, transactionFilterGroup, transactionFilterUnit,
            
            // Computed Filter Sources
            availableUserGroups, availableGroupsForUser, availableUnitsForGroup, 
            availableUnitsForFilter, availableUnitsForTransaction, availableUnitsForItemForm,
            canEditItem, 

            inventoryList, filteredInventory, filteredItemOptions,
            transactionMode, setTransactionMode, cancelTransaction,
            receiveStaging, formReceive, formDispense, addReceiveItem, removeStagingItem, submitReceive,
            handleBarcodeScan, submitManualDispense, availableDispenseLots, isDispenseLotsLoading,
            maxDispenseQty, selectedReceiveItemImage, selectedDispenseItemImage,
            
            // Delivery Note & Transport Speed
            transactionTransportSpeed, deliveryNoteFileName, handleDeliveryNoteUpload, removeDeliveryNote,

            showItemModal, itemModalMode, formOptions, formItem, isGeneratingId, filteredAnalyzers,
            openItemModal, closeItemModal, generateAutoId, saveItemData, handleItemImageUpload,
            
            getStockColorClass, getStatusText, getStatusBadgeClass, getStatusIconClass,
            openChangePassword,
            
            showPrintModal, isPrintLotsLoading, availableLots, activePrintItem, formPrint,
            openPrintModal, executePrintOldSticker,
            
            stickerConfig, mockSticker, stickerZoom, activeStickerElement,
            startDrag, startRotate, saveStickerConfig, getFontStr,
            zoomInSticker: () => { if(stickerZoom.value < 5) stickerZoom.value += 0.1; },
            zoomOutSticker: () => { if(stickerZoom.value > 0.5) stickerZoom.value -= 0.1; },
            resetZoomSticker: () => { stickerZoom.value = 3.0; },
            handleZoomWheel: (e) => { if(e.deltaY < 0) stickerZoom.value += 0.1; else stickerZoom.value -= 0.1; },
            
            handleLoginStep1, handleLoginStep2, handleCancelLogin, handleLogout, handleImageUpload,
            fetchData, forceLogout, handleResendOtp, lockScreen, formatDateThai,

            // Users Admin Management
            usersList, isUsersLoading, showEditUserModal, formUserEdit, isSavingUser,
            openUsersAdminPage, fetchUsersList, openEditUserModal, handleUserGroupChange,
            handleUserRoleChange, saveUserEdit, getRoleBadgeClass, getRoleTextColorClass
        };
    }
});

app.mount('#app');
</script>
